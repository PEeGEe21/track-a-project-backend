name: Deploy production
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
concurrency:
  group: backend-production
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    env:
      AI_TEXT_PROVIDER: ${{ vars.AI_TEXT_PROVIDER || 'none' }}
      AI_TRANSCRIPTION_PROVIDER: ${{ vars.AI_TRANSCRIPTION_PROVIDER || 'none' }}
      TRANSCRIPTION_ENABLED: ${{ vars.TRANSCRIPTION_ENABLED || 'false' }}
      OPENAI_AI_MODEL: ${{ vars.OPENAI_AI_MODEL || 'gpt-5.6-sol' }}
      OPENAI_TRANSCRIPTION_MODEL: ${{ vars.OPENAI_TRANSCRIPTION_MODEL || 'whisper-1' }}
      AI_PROVIDER_TIMEOUT_MS: ${{ vars.AI_PROVIDER_TIMEOUT_MS || '30000' }}
      AI_USER_HOURLY_LIMIT: ${{ vars.AI_USER_HOURLY_LIMIT || '50' }}
      AI_ORGANIZATION_HOURLY_LIMIT: ${{ vars.AI_ORGANIZATION_HOURLY_LIMIT || '500' }}
      AI_INPUT_COST_PER_MILLION: ${{ vars.AI_INPUT_COST_PER_MILLION || '0' }}
      AI_OUTPUT_COST_PER_MILLION: ${{ vars.AI_OUTPUT_COST_PER_MILLION || '0' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Validate AI deployment configuration
        run: |
          if { [ "$AI_TEXT_PROVIDER" = "openai" ] || [ "$AI_TRANSCRIPTION_PROVIDER" = "openai" ]; } && [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is required when an OpenAI provider is enabled"
            exit 1
          fi
          case "$AI_PROVIDER_TIMEOUT_MS:$AI_USER_HOURLY_LIMIT:$AI_ORGANIZATION_HOURLY_LIMIT" in
            *[!0-9:]*|*::*|:*|*:) echo "AI timeout and usage limits must be positive integers"; exit 1 ;;
          esac
          [ "$AI_PROVIDER_TIMEOUT_MS" -gt 0 ] && [ "$AI_USER_HOURLY_LIMIT" -gt 0 ] && [ "$AI_ORGANIZATION_HOURLY_LIMIT" -gt 0 ] || {
            echo "AI timeout and usage limits must be greater than zero"
            exit 1
          }
      - name: Trigger hosting provider deployment
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
        run: |
          test -n "$DEPLOY_HOOK_URL" || { echo "DEPLOY_HOOK_URL is not configured"; exit 1; }
          curl --fail-with-body --silent --show-error --request POST "$DEPLOY_HOOK_URL"
