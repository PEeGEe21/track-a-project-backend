name: Deploy production
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
concurrency:
  group: backend-production
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger hosting provider deployment
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
        run: |
          test -n "$DEPLOY_HOOK_URL" || { echo "DEPLOY_HOOK_URL is not configured"; exit 1; }
          curl --fail-with-body --silent --show-error --request POST "$DEPLOY_HOOK_URL"
