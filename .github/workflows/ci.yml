name: CI
on:
  workflow_call:
  pull_request:
  push:
    branches: [main, dev]
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Non-production values used only while importing configuration in CI tests.
      NODE_ENV: development
      JWT_ACCESS_TOKEN_SECRET: ci-only-access-token-secret-not-for-production
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_TOKEN_SECRET: ci-only-refresh-token-secret-not-for-production
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: https://app.ci.tailpoint.invalid
      ADMIN_FRONTEND_URL: https://admin.ci.tailpoint.invalid
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: '3306'
      DATABASE_USERNAME: ci
      DATABASE_PASSWORD: ci
      DATABASE_NAME: tailpoint_ci
      OTP_TTL: '600'
      PASSWORD_RECOVERY_TTL: '72'
      PASSWORD_RECOVERY_EMAIL: support@example.com
      PASSWORD_RECOVERY_URL: https://app.ci.tailpoint.invalid/reset-password
      REDIS_ENABLED: 'false'
      RATE_LIMIT_DRIVER: memory
      QUEUE_DRIVER: inline
      STORAGE_DRIVER: minio
      S3_BUCKET_NAME: ci-files
      S3_ACCESS_KEY_ID: ci
      S3_SECRET_ACCESS_KEY: ci-only-not-a-secret
      TRANSCRIPTION_ENABLED: 'false'
      AI_TEXT_PROVIDER: none
      AI_TRANSCRIPTION_PROVIDER: none
      OPENAI_AI_MODEL: gpt-5.6-sol
      OPENAI_TRANSCRIPTION_MODEL: whisper-1
      HUGGINGFACE_AI_MODEL: google/gemma-3-4b-it
      AI_PROVIDER_TIMEOUT_MS: '30000'
      AI_USER_HOURLY_LIMIT: '50'
      AI_ORGANIZATION_HOURLY_LIMIT: '500'
      AI_INPUT_COST_PER_MILLION: '0'
      AI_OUTPUT_COST_PER_MILLION: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:smoke -- --ci
      - run: npm run build
